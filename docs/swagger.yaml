basePath: /
definitions:
  dto.AssignSkillRequest:
    properties:
      treatment_id:
        example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        type: string
      user_id:
        example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        type: string
    required:
    - treatment_id
    - user_id
    type: object
  dto.BadRequestResponse:
    properties:
      code:
        example: 400
        type: integer
      errors:
        items:
          $ref: '#/definitions/dto.FieldError'
        type: array
      message:
        example: bad request
        type: string
    type: object
  dto.CreateBookingRequest:
    properties:
      staff_id:
        type: string
      start_time:
        type: string
      treatment_id:
        type: string
    required:
    - staff_id
    - start_time
    - treatment_id
    type: object
  dto.CreateTreatmentRequest:
    properties:
      description:
        example: Standard haircut
        type: string
      duration:
        example: 30
        minimum: 1
        type: integer
      name:
        example: Haircut
        type: string
      price:
        example: 50
        minimum: 0
        type: number
    required:
    - duration
    - name
    - price
    type: object
  dto.CreatedResponse:
    properties:
      code:
        example: 201
        type: integer
      data: {}
      message:
        example: User created successfully
        type: string
    type: object
  dto.FieldError:
    properties:
      field:
        example: phone_number
        type: string
      message:
        example: invalid phone number
        type: string
    type: object
  dto.ForbiddenResponse:
    properties:
      code:
        example: 403
        type: integer
      message:
        example: forbidden
        type: string
    type: object
  dto.GetAvailabelSlotRequest:
    properties:
      date:
        example: "2025-10-15"
        type: string
      staff_id:
        example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        type: string
      treatment_id:
        example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        type: string
    required:
    - date
    - staff_id
    - treatment_id
    type: object
  dto.InternalErrorResponse:
    properties:
      code:
        example: 500
        type: integer
      message:
        example: Internal server error
        type: string
    type: object
  dto.LoginRequest:
    properties:
      phone:
        example: +628****7890
        type: string
    required:
    - phone
    type: object
  dto.Meta:
    properties:
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 50
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  dto.PaginatedResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: success
        type: string
      meta:
        $ref: '#/definitions/dto.Meta'
    type: object
  dto.RegisterOTPRequest:
    properties:
      phone:
        example: +628****7890
        type: string
      user_id:
        example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        type: string
    required:
    - phone
    - user_id
    type: object
  dto.RegisterUserRequest:
    properties:
      address:
        example: Jl. Merdeka No. 1
        type: string
      email:
        example: john.doe@example.com
        type: string
      full_name:
        example: John Doe
        type: string
      phone_number:
        example: +628****7890
        type: string
      photo:
        example: http://example.com/photo.jpg
        type: string
    required:
    - address
    - email
    - full_name
    - phone_number
    type: object
  dto.SuccessResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: OTP sent successfully
        type: string
    type: object
  dto.UpdateTreatmentRequest:
    properties:
      description:
        example: Standard haircut
        type: string
      duration:
        example: 30
        minimum: 1
        type: integer
      name:
        example: Haircut
        type: string
      price:
        example: 50
        minimum: 0
        type: number
    type: object
  dto.UpdateUserRequest:
    properties:
      address:
        example: Jl. Merdeka No. 1
        type: string
      email:
        example: john.doe@example.com
        type: string
      full_name:
        example: John Doe
        type: string
      phone_number:
        example: +628****7890
        type: string
      photo:
        example: http://example.com/photo.jpg
        type: string
    type: object
  dto.VerifyUserRequest:
    properties:
      otp:
        example: "123456"
        type: string
      phone:
        example: +628****7890
        type: string
    required:
    - otp
    - phone
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server for a scheduling application.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Jadwalin API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Sends an OTP to the registered phone number for login.
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Login — request OTP
      tags:
      - Auth
  /api/auth/login-verify:
    post:
      consumes:
      - application/json
      description: Verifies the OTP for login and returns a JWT token.
      parameters:
      - description: Verify OTP Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Login — verify OTP
      tags:
      - Auth
  /api/auth/register-otp:
    post:
      consumes:
      - application/json
      description: Sends an OTP to the user's registered phone number for verification.
      parameters:
      - description: Register OTP Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Register OTP for a user
      tags:
      - Auth
  /api/booking:
    post:
      consumes:
      - application/json
      description: Creates a new booking (authenticated user)
      parameters:
      - description: Create Booking Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new booking
      tags:
      - Booking
  /api/booking/{id}:
    get:
      consumes:
      - application/json
      description: Returns a booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ForbiddenResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get booking by ID
      tags:
      - Booking
  /api/booking/available-slots:
    post:
      consumes:
      - application/json
      description: Returns all available time slots for a given treatment, staff,
        and date
      parameters:
      - description: Get Available Slots Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.GetAvailabelSlotRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Get available time slots for a treatment + staff + date
      tags:
      - Booking
  /api/booking/user/{userId}:
    get:
      consumes:
      - application/json
      description: Returns all bookings for a given user (must match authenticated
        user or be admin)
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Filter by status (pending/confirmed/completed/cancelled)
        in: query
        name: status
        type: string
      - description: Filter by treatment name (partial match)
        in: query
        name: treatment_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ForbiddenResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get bookings by user ID
      tags:
      - Booking
  /api/staff-skills:
    post:
      consumes:
      - application/json
      description: Assigns a treatment to a staff member (admin only)
      parameters:
      - description: Assign Skill Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AssignSkillRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Assign a treatment skill to a staff
      tags:
      - StaffSkill
  /api/staff-skills/{id}:
    delete:
      description: Unassigns a treatment from a staff member (admin only)
      parameters:
      - description: StaffSkill ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Remove a skill from a staff
      tags:
      - StaffSkill
    get:
      description: Returns a single staff-skill assignment with joined user and treatment
      parameters:
      - description: StaffSkill ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Get a staff skill by ID
      tags:
      - StaffSkill
  /api/staff-skills/list:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of all staff-skill assignments, with optional
        search by staff name
      parameters:
      - description: Page number (default 1)
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Search keyword (matches staff name or phone)
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: List all staff-skill assignments with pagination
      tags:
      - StaffSkill
  /api/staff-skills/staff/{userId}:
    get:
      description: Returns all treatments a staff member can perform
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: List skills for a staff member
      tags:
      - StaffSkill
  /api/staff-skills/treatment/{treatmentId}:
    get:
      description: Returns all staff members skilled at a given treatment
      parameters:
      - description: Treatment ID
        in: path
        name: treatmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: List staff who can perform a treatment
      tags:
      - StaffSkill
  /api/treatment:
    post:
      consumes:
      - application/json
      description: Creates a new treatment (admin only)
      parameters:
      - description: Create Treatment Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTreatmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new treatment
      tags:
      - Treatment
  /api/treatment/{id}:
    delete:
      description: Deletes a treatment by ID (soft delete)
      parameters:
      - description: Treatment ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a treatment
      tags:
      - Treatment
    get:
      description: Returns a single treatment
      parameters:
      - description: Treatment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Get a treatment by ID
      tags:
      - Treatment
    put:
      consumes:
      - application/json
      description: Updates an existing treatment
      parameters:
      - description: Treatment ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Treatment Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTreatmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update a treatment
      tags:
      - Treatment
  /api/treatment/list:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of treatments with optional search
      parameters:
      - description: Page number (default 1)
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Search keyword (matches name)
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: List treatments with pagination
      tags:
      - Treatment
  /api/user/{id}:
    delete:
      description: Deletes a user by ID (soft delete).
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a user
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Updates an existing user's profile (phone, email, address, full
        name, photo). All fields are optional.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update User Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update a user
      tags:
      - User
  /api/user/{id}/photo:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a photo for a specific user.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: User photo file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Upload a user photo
      tags:
      - User
  /api/user/list:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of users, with optional search and role
        filter.
      parameters:
      - description: Page number (default 1)
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Search keyword (matches name, phone, email)
        in: query
        name: search
        type: string
      - description: Role filter (default user)
        enum:
        - admin
        - staff
        - user
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List users with pagination
      tags:
      - User
  /api/user/register-staff:
    post:
      consumes:
      - application/json
      description: Registers a new staff with the provided details.
      parameters:
      - description: Register User Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Register a new staff
      tags:
      - User
  /api/user/verify:
    post:
      consumes:
